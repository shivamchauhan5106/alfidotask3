<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products Manager — Dashboard</title>
  <meta name="description" content="Authenticated products management dashboard. Requires login." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #070d18;
      --surface: #0f1a2e;
      --surface-2: #162032;
      --surface-hover: #1c2840;
      --border: #1e2d45;
      --border-light: rgba(99,130,180,0.12);
      --text: #dde6f5;
      --muted: #6b7f9e;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59,130,246,0.25);
      --success: #22d3a0;
      --danger: #f16060;
      --warning: #f59e0b;
      --radius: 12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      min-height: 100vh;
    }

    /* ── Auth gate overlay ── */
    #authGate {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 999;
      transition: opacity 0.3s;
    }

    .gate-spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0; z-index: 50;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex; align-items: center; gap: 0.75rem;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
    }

    header h1 {
      font-size: 1.05rem; font-weight: 700;
      letter-spacing: -0.02em; color: var(--text);
    }

    header h1 span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .api-status {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.78rem; color: var(--muted);
    }

    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }

    .user-pill {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 999px; padding: 0.3rem 0.75rem 0.3rem 0.4rem;
      font-size: 0.82rem; color: var(--text);
    }

    .user-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }

    .btn-logout {
      background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.8rem; padding: 0.38rem 0.85rem;
      border-radius: 8px; cursor: pointer; font-family: inherit;
      transition: all 0.15s;
    }
    .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

    /* ── Main layout ── */
    main { max-width: 1160px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* ── Page title bar ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem; margin-bottom: 1.75rem;
    }

    .page-header h2 {
      font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em;
    }

    .page-header h2 span { color: var(--accent); }

    /* ── Alert banner ── */
    .alert {
      padding: 0.8rem 1rem; border-radius: var(--radius);
      margin-bottom: 1.25rem; font-size: 0.875rem;
      display: none; align-items: center; gap: 0.5rem;
      border: 1px solid;
    }
    .alert.show { display: flex; }
    .alert.error { background: rgba(241,96,96,0.1); border-color: rgba(241,96,96,0.3); color: #fca5a5; }
    .alert.success { background: rgba(34,211,160,0.1); border-color: rgba(34,211,160,0.3); color: #6ee7b7; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 0.65rem;
      align-items: center; margin-bottom: 1.5rem;
    }

    .toolbar select, .toolbar input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.8rem;
      border-radius: 8px; font-size: 0.875rem;
      font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    .toolbar select:focus, .toolbar input:focus { border-color: var(--accent); }
    .toolbar input[type="number"] { width: 130px; }

    /* ── Buttons ── */
    button { font-family: inherit; cursor: pointer; border: none; }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff; font-weight: 600; font-size: 0.875rem;
      padding: 0.55rem 1.1rem; border-radius: 8px;
      box-shadow: 0 2px 10px var(--accent-glow);
      transition: opacity 0.15s, transform 0.12s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-ghost {
      background: var(--surface);
      color: var(--text); border: 1px solid var(--border);
      font-size: 0.875rem; padding: 0.5rem 0.9rem; border-radius: 8px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { background: var(--surface-hover); border-color: rgba(99,130,180,0.25); }

    .btn-danger-sm {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(241,96,96,0.3);
      font-size: 0.78rem; padding: 0.35rem 0.7rem; border-radius: 7px;
      transition: all 0.15s;
    }
    .btn-danger-sm:hover { background: rgba(241,96,96,0.12); border-color: var(--danger); }

    .btn-edit-sm {
      background: var(--surface-2); color: var(--text);
      border: 1px solid var(--border);
      font-size: 0.78rem; padding: 0.35rem 0.7rem; border-radius: 7px;
      transition: all 0.15s;
    }
    .btn-edit-sm:hover { background: var(--surface-hover); }

    /* ── Grid layout ── */
    .grid {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 1.5rem; align-items: start;
    }

    @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

    /* ── Panels ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .panel-title {
      font-size: 0.7rem; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.5rem;
    }

    .panel-title .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
    }

    /* ── Form fields ── */
    .field { margin-bottom: 0.9rem; }

    form label {
      display: block; font-size: 0.75rem; font-weight: 500;
      color: var(--muted); margin-bottom: 0.38rem;
      text-transform: uppercase; letter-spacing: 0.04em;
    }

    form input, form select, form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem 0.75rem;
      border-radius: 8px; font-size: 0.88rem;
      font-family: inherit; outline: none;
      transition: border-color 0.2s;
    }
    form input:focus, form select:focus, form textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
    form textarea { resize: vertical; min-height: 72px; }

    .checkbox-row {
      display: flex; align-items: center; gap: 0.5rem; margin-top: 0.75rem;
    }
    .checkbox-row input { width: auto; }

    .form-actions { display: flex; gap: 0.5rem; margin-top: 1.25rem; }

    /* ── Auth required notice (shown when not logged in trying to mutate) ── */
    .auth-notice {
      font-size: 0.78rem; color: var(--warning);
      display: flex; align-items: center; gap: 0.4rem;
      margin-top: 0.75rem; padding: 0.55rem 0.75rem;
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);
      border-radius: 8px;
    }

    /* ── Products list ── */
    .products-list { display: flex; flex-direction: column; gap: 0.75rem; }

    .product-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .product-card:hover { border-color: rgba(59,130,246,0.35); box-shadow: 0 0 0 1px rgba(59,130,246,0.1); }

    .product-info h3 { font-size: 0.97rem; font-weight: 600; margin-bottom: 0.2rem; }
    .product-info p { font-size: 0.83rem; color: var(--muted); margin-bottom: 0.5rem; }

    .meta { display: flex; flex-wrap: wrap; gap: 0.4rem; }

    .badge {
      background: var(--surface-hover); padding: 0.14rem 0.5rem;
      border-radius: 999px; font-size: 0.75rem; color: var(--muted);
      border: 1px solid var(--border-light);
    }
    .badge.price { color: var(--accent); font-weight: 600; background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.2); }
    .badge.in-stock { color: var(--success); background: rgba(34,211,160,0.08); border-color: rgba(34,211,160,0.2); }
    .badge.out-stock { color: var(--danger); background: rgba(241,96,96,0.08); border-color: rgba(241,96,96,0.2); }

    .card-actions { display: flex; flex-direction: column; gap: 0.4rem; flex-shrink: 0; }

    .empty {
      text-align: center; padding: 3.5rem 1rem;
      color: var(--muted); font-size: 0.9rem;
    }
    .empty svg { display: block; margin: 0 auto 0.75rem; opacity: 0.4; }

    .loading { text-align: center; padding: 2.5rem; color: var(--muted); }

    /* ── Stats strip ── */
    .stats {
      display: flex; flex-wrap: wrap; gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1.1rem;
      flex: 1; min-width: 130px;
    }

    .stat-card .stat-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.3rem; }
    .stat-card .stat-value { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.03em; }
    .stat-card .stat-value.blue { color: var(--accent); }
    .stat-card .stat-value.green { color: var(--success); }
    .stat-card .stat-value.amber { color: var(--warning); }

    /* ── Count badge in section header ── */
    .count-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--accent); color: #fff;
      border-radius: 999px; font-size: 0.68rem; font-weight: 700;
      padding: 0.05rem 0.45rem; margin-left: 0.35rem;
    }
  </style>
</head>
<body>

  <!-- Auth gate shown while verifying JWT cookie -->
  <div id="authGate">
    <div class="gate-spinner"></div>
  </div>

  <!-- ── Header ── -->
  <header>
    <div class="header-left">
      <div class="logo-icon">📦</div>
      <h1><span>Products</span> Manager</h1>
    </div>
    <div class="header-right">
      <div class="api-status">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking…</span>
      </div>
      <div class="user-pill" id="userPill" style="display:none">
        <div class="user-avatar" id="userAvatar">?</div>
        <span id="userName">…</span>
      </div>
      <button class="btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2>Your <span>Catalog</span></h2>
    </div>

    <!-- Stats strip -->
    <div class="stats" id="statsStrip">
      <div class="stat-card">
        <div class="stat-label">Total products</div>
        <div class="stat-value blue" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">In stock</div>
        <div class="stat-value green" id="statInStock">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Out of stock</div>
        <div class="stat-value amber" id="statOut">—</div>
      </div>
    </div>

    <div id="alert" class="alert" role="alert" aria-live="polite"></div>

    <!-- Toolbar -->
    <div class="toolbar">
      <select id="filterCategory" aria-label="Filter by category">
        <option value="">All categories</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="food">Food</option>
        <option value="books">Books</option>
        <option value="other">Other</option>
      </select>
      <select id="filterStock" aria-label="Filter by stock">
        <option value="">All stock</option>
        <option value="true">In stock</option>
        <option value="false">Out of stock</option>
      </select>
      <input type="number" id="filterMinPrice" placeholder="Min price" min="0" step="0.01" aria-label="Min price" />
      <input type="number" id="filterMaxPrice" placeholder="Max price" min="0" step="0.01" aria-label="Max price" />
      <button type="button" class="btn-ghost" id="applyFilters">Apply</button>
      <button type="button" class="btn-ghost" id="clearFilters">Clear</button>
    </div>

    <div class="grid">
      <!-- ── Form panel ── -->
      <section class="panel" aria-labelledby="formTitle">
        <div class="panel-title"><span class="dot"></span><span id="formTitle">Add product</span></div>
        <form id="productForm" novalidate>
          <input type="hidden" id="productId" />

          <div class="field">
            <label for="name">Name *</label>
            <input type="text" id="name" required maxlength="100" placeholder="Wireless Mouse" />
          </div>

          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" maxlength="500" placeholder="Optional description"></textarea>
          </div>

          <div class="field">
            <label for="price">Price *</label>
            <input type="number" id="price" required min="0" step="0.01" placeholder="29.99" />
          </div>

          <div class="field">
            <label for="category">Category *</label>
            <select id="category" required>
              <option value="">Select category</option>
              <option value="electronics">Electronics</option>
              <option value="clothing">Clothing</option>
              <option value="food">Food</option>
              <option value="books">Books</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="field">
            <label for="quantity">Quantity</label>
            <input type="number" id="quantity" min="0" value="0" />
          </div>

          <div class="checkbox-row">
            <input type="checkbox" id="inStock" checked />
            <label for="inStock" style="margin:0;text-transform:none;font-size:0.875rem;">In stock</label>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary" id="submitBtn">Create product</button>
            <button type="button" class="btn-ghost" id="cancelEdit" style="display:none">Cancel</button>
          </div>
        </form>
      </section>

      <!-- ── Products panel ── -->
      <section class="panel" aria-labelledby="listTitle">
        <div class="panel-title">
          <span class="dot"></span>
          <span id="listTitle">Products</span>
          <span class="count-badge" id="productCount">0</span>
        </div>
        <div id="productsContainer" class="loading">Loading products…</div>
      </section>
    </div>
  </main>

  <script>
    'use strict';

    const API_PRODUCTS = '/api/products';
    const API_AUTH     = '/api/auth';
    const LOGIN_PAGE   = '/login.html';

    const alertEl       = document.getElementById('alert');
    const form          = document.getElementById('productForm');
    const formTitle     = document.getElementById('formTitle');
    const submitBtn     = document.getElementById('submitBtn');
    const cancelEdit    = document.getElementById('cancelEdit');
    const productIdInput = document.getElementById('productId');
    const productsContainer = document.getElementById('productsContainer');
    const productCount  = document.getElementById('productCount');
    const logoutBtn     = document.getElementById('logoutBtn');
    const authGate      = document.getElementById('authGate');

    // ── Utilities ────────────────────────────────────────────────────────────

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str ?? '';
      return d.innerHTML;
    }

    function showAlert(msg, type = 'error') {
      const icon = type === 'error'
        ? `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
        : `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
      alertEl.innerHTML = icon + `<span>${escapeHtml(msg)}</span>`;
      alertEl.className = `alert show ${type}`;
      setTimeout(() => alertEl.classList.remove('show'), 5000);
    }

    // ── Auth guard — runs immediately on page load ─────────────────────────

    async function verifyAuth() {
      try {
        const res = await fetch(`${API_AUTH}/me`, { credentials: 'include' });
        if (!res.ok) {
          window.location.href = LOGIN_PAGE;
          return null;
        }
        const data = await res.json();
        return data.user;
      } catch {
        window.location.href = LOGIN_PAGE;
        return null;
      }
    }

    // ── API health ────────────────────────────────────────────────────────────

    async function checkHealth() {
      const dot  = document.getElementById('statusDot');
      const text = document.getElementById('statusText');
      try {
        const res = await fetch('/health');
        const d   = await res.json();
        if (d.success) {
          dot.classList.add('online');
          text.textContent = 'API online';
        } else {
          text.textContent = 'API unavailable';
        }
      } catch {
        text.textContent = 'API offline';
      }
    }

    // ── Products ──────────────────────────────────────────────────────────────

    function buildQuery() {
      const params = new URLSearchParams();
      const cat    = document.getElementById('filterCategory').value;
      const stock  = document.getElementById('filterStock').value;
      const min    = document.getElementById('filterMinPrice').value;
      const max    = document.getElementById('filterMaxPrice').value;
      if (cat)   params.set('category', cat);
      if (stock) params.set('inStock', stock);
      if (min)   params.set('minPrice', min);
      if (max)   params.set('maxPrice', max);
      const qs = params.toString();
      return qs ? `${API_PRODUCTS}?${qs}` : API_PRODUCTS;
    }

    function updateStats(products) {
      const inStock = products.filter(p => p.inStock).length;
      document.getElementById('statTotal').textContent   = products.length;
      document.getElementById('statInStock').textContent = inStock;
      document.getElementById('statOut').textContent     = products.length - inStock;
    }

    function renderProducts(products) {
      productCount.textContent = products.length;
      updateStats(products);

      if (products.length === 0) {
        productsContainer.innerHTML = `
          <div class="empty">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
            No products found. Add one using the form.
          </div>`;
        return;
      }

      productsContainer.innerHTML = products.map(p => `
        <article class="product-card" data-id="${escapeHtml(p._id)}">
          <div class="product-info">
            <h3>${escapeHtml(p.name)}</h3>
            <p>${escapeHtml(p.description || 'No description')}</p>
            <div class="meta">
              <span class="badge price">$${Number(p.price).toFixed(2)}</span>
              <span class="badge">${escapeHtml(p.category)}</span>
              <span class="badge">Qty: ${p.quantity}</span>
              <span class="badge ${p.inStock ? 'in-stock' : 'out-stock'}">${p.inStock ? 'In stock' : 'Out of stock'}</span>
            </div>
          </div>
          <div class="card-actions">
            <button type="button" class="btn-edit-sm edit-btn">Edit</button>
            <button type="button" class="btn-danger-sm delete-btn">Delete</button>
          </div>
        </article>
      `).join('');

      productsContainer.querySelectorAll('.edit-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.closest('.product-card').dataset.id;
          startEdit(products.find(p => p._id === id));
        });
      });

      productsContainer.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.closest('.product-card').dataset.id;
          if (!confirm('Delete this product?')) return;
          await deleteProduct(id);
        });
      });
    }

    async function loadProducts() {
      productsContainer.innerHTML = '<div class="loading">Loading products…</div>';
      try {
        const res  = await fetch(buildQuery(), { credentials: 'include' });
        const json = await res.json();
        if (!json.success) throw new Error(json.message || 'Failed to load');
        renderProducts(json.data);
      } catch (err) {
        productsContainer.innerHTML = `<div class="empty">${escapeHtml(err.message)}</div>`;
      }
    }

    function resetForm() {
      form.reset();
      productIdInput.value = '';
      document.getElementById('inStock').checked = true;
      formTitle.textContent = 'Add product';
      submitBtn.textContent = 'Create product';
      cancelEdit.style.display = 'none';
    }

    function startEdit(product) {
      if (!product) return;
      productIdInput.value = product._id;
      document.getElementById('name').value        = product.name;
      document.getElementById('description').value = product.description || '';
      document.getElementById('price').value       = product.price;
      document.getElementById('category').value    = product.category;
      document.getElementById('quantity').value    = product.quantity;
      document.getElementById('inStock').checked   = product.inStock;
      formTitle.textContent   = 'Edit product';
      submitBtn.textContent   = 'Update product';
      cancelEdit.style.display = 'inline-block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function deleteProduct(id) {
      try {
        const res  = await fetch(`${API_PRODUCTS}/${id}`, {
          method: 'DELETE', credentials: 'include'
        });
        const json = await res.json();
        if (!res.ok) {
          if (res.status === 401) { window.location.href = LOGIN_PAGE; return; }
          throw new Error(json.message || 'Delete failed');
        }
        showAlert('Product deleted', 'success');
        if (productIdInput.value === id) resetForm();
        loadProducts();
      } catch (err) {
        showAlert(err.message);
      }
    }

    // ── Form submit ───────────────────────────────────────────────────────────

    form.addEventListener('submit', async e => {
      e.preventDefault();

      const payload = {
        name:        document.getElementById('name').value.trim(),
        description: document.getElementById('description').value.trim(),
        price:       Number(document.getElementById('price').value),
        category:    document.getElementById('category').value,
        quantity:    Number(document.getElementById('quantity').value),
        inStock:     document.getElementById('inStock').checked,
      };

      const id     = productIdInput.value;
      const url    = id ? `${API_PRODUCTS}/${id}` : API_PRODUCTS;
      const method = id ? 'PUT' : 'POST';

      submitBtn.disabled   = true;
      submitBtn.textContent = id ? 'Updating…' : 'Creating…';

      try {
        const res  = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(payload),
        });
        const json = await res.json();

        if (!res.ok) {
          if (res.status === 401) { window.location.href = LOGIN_PAGE; return; }
          const msg = Array.isArray(json.errors)
            ? json.errors.map(e => typeof e === 'string' ? e : e.message).join(', ')
            : json.message || 'Request failed';
          throw new Error(msg);
        }

        showAlert(id ? 'Product updated ✓' : 'Product created ✓', 'success');
        resetForm();
        loadProducts();
      } catch (err) {
        showAlert(err.message);
      } finally {
        submitBtn.disabled   = false;
        submitBtn.textContent = productIdInput.value ? 'Update product' : 'Create product';
      }
    });

    // ── Logout ────────────────────────────────────────────────────────────────

    logoutBtn.addEventListener('click', async () => {
      logoutBtn.textContent = 'Signing out…';
      try {
        await fetch(`${API_AUTH}/logout`, { method: 'POST', credentials: 'include' });
      } catch (_) {}
      window.location.href = LOGIN_PAGE;
    });

    // ── Filter toolbar ────────────────────────────────────────────────────────

    document.getElementById('applyFilters').addEventListener('click', loadProducts);
    document.getElementById('clearFilters').addEventListener('click', () => {
      document.getElementById('filterCategory').value = '';
      document.getElementById('filterStock').value    = '';
      document.getElementById('filterMinPrice').value = '';
      document.getElementById('filterMaxPrice').value = '';
      loadProducts();
    });
    cancelEdit.addEventListener('click', resetForm);

    // ── Bootstrap ─────────────────────────────────────────────────────────────

    (async () => {
      const user = await verifyAuth();
      if (!user) return; // will redirect

      // Remove auth gate and show page
      authGate.style.opacity = '0';
      setTimeout(() => authGate.remove(), 300);

      // Show user info
      const pill   = document.getElementById('userPill');
      const avatar = document.getElementById('userAvatar');
      const name   = document.getElementById('userName');
      avatar.textContent = user.username.charAt(0).toUpperCase();
      name.textContent   = user.username;
      pill.style.display = 'flex';

      checkHealth();
      loadProducts();
    })();
  </script>
</body>
</html>
