<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Products Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060b14;
      --surface: rgba(15, 23, 42, 0.85);
      --surface-solid: #0f172a;
      --border: rgba(99, 130, 180, 0.18);
      --border-focus: rgba(99, 179, 237, 0.55);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --accent-glow: rgba(59, 130, 246, 0.35);
      --danger: #f87171;
      --success: #34d399;
      --radius: 14px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Animated gradient orbs ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb:nth-child(1) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1d4ed8 0%, transparent 70%);
      top: -150px; left: -150px;
      animation-duration: 14s;
    }

    .bg-orb:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      bottom: -120px; right: -100px;
      animation-duration: 10s;
      animation-delay: -4s;
    }

    .bg-orb:nth-child(3) {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #0891b2 0%, transparent 70%);
      top: 50%; left: 60%;
      animation-duration: 18s;
      animation-delay: -8s;
    }

    @keyframes drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(30px, -20px) scale(1.08); }
      100% { transform: translate(-15px, 25px) scale(0.95); }
    }

    /* ── Grid overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99, 130, 180, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 130, 180, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      pointer-events: none;
    }

    /* ── Card ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      margin: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255,255,255,0.04);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo / brand ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin-bottom: 2rem;
    }

    .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 4px 14px var(--accent-glow);
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(90deg, #e2e8f0, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── Headings ── */
    .card h1 {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }

    .card h1 span { color: var(--accent); }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    /* ── Form ── */
    .field { margin-bottom: 1.1rem; }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 0.45rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      width: 17px; height: 17px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    input {
      width: 100%;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.72rem 0.85rem 0.72rem 2.6rem;
      border-radius: 10px;
      font-size: 0.93rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    input:focus + svg,
    .input-wrap:focus-within svg { color: var(--accent); }

    input::placeholder { color: #4a5568; }

    /* Eye toggle for password */
    .eye-btn {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .eye-btn:hover { color: var(--text); }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: #fff;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.8rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px var(--accent-glow);
      margin-top: 0.5rem;
      font-family: inherit;
      position: relative;
      overflow: hidden;
    }

    .btn-submit::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.15s;
    }

    .btn-submit:hover::after { background: rgba(255,255,255,0.08); }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* ── Error / success alert ── */
    .alert {
      display: none;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
      border: 1px solid;
    }

    .alert.show { display: flex; align-items: center; gap: 0.5rem; }

    .alert.error {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.35);
      color: #fca5a5;
    }

    .alert.success {
      background: rgba(52, 211, 153, 0.1);
      border-color: rgba(52, 211, 153, 0.3);
      color: #6ee7b7;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Footer link ── */
    .footer-text {
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s;
    }

    .footer-text a:hover { color: #93c5fd; text-decoration: underline; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Floating label badge ── */
    .security-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1rem;
      padding: 0.45rem 0.75rem;
      background: rgba(99, 130, 180, 0.07);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .security-badge svg { width: 13px; height: 13px; color: var(--success); flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>
  <div class="bg-orb"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-icon">📦</div>
      <span class="brand-name">Products Manager</span>
    </div>

    <h1>Welcome <span>back</span></h1>
    <p class="subtitle">Sign in to manage your product catalog</p>

    <div id="alert" class="alert" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <div class="input-wrap">
          <input
            type="email"
            id="email"
            name="email"
            autocomplete="email"
            placeholder="you@example.com"
            required
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input
            type="password"
            id="password"
            name="password"
            autocomplete="current-password"
            placeholder="••••••••"
            required
          />
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password visibility">
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">Sign In</button>
    </form>

    <div class="divider">or</div>

    <p class="footer-text">
      Don't have an account?
      <a href="/signup.html" id="signupLink">Create one free</a>
    </p>

    <div class="security-badge">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="m9 12 2 2 4-4"/>
      </svg>
      Token stored in httpOnly cookie · Never exposed to JavaScript
    </div>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const alertEl = document.getElementById('alert');
    const submitBtn = document.getElementById('submitBtn');
    const eyeBtn = document.getElementById('eyeBtn');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    // ── Eye toggle ──
    const eyeOpen = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;

    eyeBtn.addEventListener('click', () => {
      const hidden = passwordInput.type === 'password';
      passwordInput.type = hidden ? 'text' : 'password';
      eyeIcon.innerHTML = hidden ? eyeClosed : eyeOpen;
    });

    // ── Alert ──
    function showAlert(msg, type = 'error') {
      const icon = type === 'error'
        ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
        : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>`;
      alertEl.innerHTML = icon + '<span>' + msg + '</span>';
      alertEl.className = `alert show ${type}`;
    }

    function hideAlert() { alertEl.className = 'alert'; }

    // ── Submit ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert();

      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showAlert('Please fill in all fields.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',   // send/receive cookies
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.message || 'Login failed. Please try again.');
          return;
        }

        showAlert('Logged in! Redirecting…', 'success');

        setTimeout(() => {
          window.location.href = '/ind.html';
        }, 800);

      } catch (err) {
        showAlert('Network error. Is the server running?');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = 'Sign In';
      }
    });

    // ── Auto-redirect if already logged in ──
    (async () => {
      try {
        const res = await fetch('/api/auth/me', { credentials: 'include' });
        if (res.ok) window.location.href = '/ind.html';
      } catch (_) {}
    })();
  </script>
</body>
</html>
